<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="min-h-screen bg-gradient-to-b from-[#4a7ba7] to-[#1d4d7a] flex items-center justify-center px-4"
  >
    <div class="w-full max-w-lg">
      <div class="text-center mb-10">
        <h1 class="text-xl font-bold text-gray-900 uppercase tracking-[0.2em]">
          Forgot Password?
        </h1>
        <p class="mt-3 text-sm text-gray-800">Enter your Username here!</p>
      </div>

      <div class="space-y-6">
        <div
          class="flex items-center bg-gray-200 rounded-full px-6 py-4 shadow-sm"
        >
          <svg
            class="w-5 h-5 text-gray-600"
            fill="currentColor"
            viewBox="0 0 20 20"
          >
            <path
              d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"
            ></path>
            <path
              d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"
            ></path>
          </svg>
          <input
            type="email"
            placeholder="Email Address"
            class="bg-transparent ml-4 w-full outline-none text-gray-700 placeholder-gray-600"
          />
        </div>

        <div
          class="flex items-center bg-gray-200 rounded-full px-6 py-4 shadow-sm"
        >
          <svg
            class="w-5 h-5 text-gray-600"
            fill="currentColor"
            viewBox="0 0 20 20"
          >
            <path
              fill-rule="evenodd"
              d="M10 2a4 4 0 00-4 4v2a5 5 0 00-5 5v2a2 2 0 002 2h14a2 2 0 002-2v-2a5 5 0 00-5-5V6a4 4 0 00-4-4zm-2 6V6a2 2 0 114 0v2H8z"
              clip-rule="evenodd"
            />
          </svg>
          <input
            type="text"
            placeholder="Username"
            class="bg-transparent ml-4 w-full outline-none text-gray-700 placeholder-gray-600"
          />
        </div>

        <button
          class="w-full bg-gray-300 hover:bg-gray-400 text-gray-900 font-semibold py-3 rounded-full transition duration-200"
        >
          Continue
        </button>
      </div>
    </div>
  </body>
</html>
